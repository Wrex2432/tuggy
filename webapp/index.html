<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Truck Of War Controller (Combi)</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <div id="statusDot" class="status-dot hidden" aria-hidden="true"></div>

      <div id="loading" class="loading hidden" aria-hidden="true">
        <div class="loading-card">
          <div class="spinner" aria-hidden="true"></div>
          <div id="loadingTitle" class="loading-title">Connecting…</div>
          <div id="loadingSub" class="loading-sub">Please keep this page open.</div>
          <div id="uidHint" class="uid-hint hidden"></div>
        </div>
      </div>

      <div id="roundPopup" class="round-popup hidden" aria-hidden="true">
        <div class="round-card">
          <div id="roundPopupTitle" class="round-title">ROUND</div>
          <div id="roundPopupBody" class="round-body">—</div>
        </div>
      </div>

      <div id="toast" class="toast hidden" role="alert" aria-live="polite">
        <div id="toastText" class="toast-text">Error</div>
      </div>

      <section id="viewInput" class="view">
        <div class="card">
          <div class="brand">
            <div class="brand-title">TRUCK OF WAR</div>
            <div class="brand-sub">Player Controller</div>
          </div>

          <div class="form">
            <div id="roomCodeWrap">
              <label id="codeLabel" class="label" for="roomCode">Room Code</label>
              <input id="roomCode" class="input" type="text" maxlength="8" placeholder="ABCD" />
            </div>

            <label class="label" for="username">Username</label>
            <input id="username" class="input" type="text" maxlength="24" placeholder="Your name" />

            <label class="label" for="fullName">Full Name</label>
            <input id="fullName" class="input" type="text" maxlength="80" placeholder="Your full name" />

            <button id="btnJoin" class="btn primary" type="button">JOIN</button>
          </div>
        </div>
      </section>

      <section id="viewControl" class="view hidden">
        <div class="arena">
          <img id="teamBanner" class="team-banner hidden" alt="Team banner" />

          <button id="btnTap" class="tap-image-btn" type="button" disabled aria-label="Tap">
            <img id="tapImage" src="./assets/Button_Active.png" alt="Tap button" />
          </button>

          <img id="teamTruck" class="team-truck hidden" alt="Team truck" />

          <div id="devPanel" class="dev-panel hidden">
            <div><strong>Taps:</strong> <span id="tapCount">0</span></div>
            <div><strong>Room:</strong> <span id="roomView">—</span></div>
            <div><strong>UID:</strong> <span id="uidView">—</span></div>
          </div>
        </div>
      </section>

      <section id="viewEnd" class="view hidden">
        <div class="arena end-arena">
          <img id="teamBannerEnd" class="team-banner hidden" alt="Team banner" />

          <div class="card end-card">
            <div id="endTitle" class="end-title">GAME OVER</div>
            <div id="endResult" class="end-result">—</div>

            <div class="end-stats">
              <div class="end-row"><div class="end-k">Team</div><div id="endTeam" class="end-v">—</div></div>
              <div class="end-row"><div class="end-k">Your Taps</div><div id="endTaps" class="end-v">0</div></div>
              <div class="end-row"><div class="end-k">Team Rank</div><div id="endTTR" class="end-v">—</div></div>
              <div class="end-row"><div class="end-k">Global Rank</div><div id="endGTR" class="end-v">—</div></div>
            </div>

            <button id="btnRestart" class="btn" type="button">PLAY AGAIN</button>
          </div>

          <img id="teamTruckEnd" class="team-truck hidden" alt="Team truck" />
        </div>
      </section>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
